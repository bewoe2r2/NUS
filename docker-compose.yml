version: "3.9"

services:
  bewo-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bewo-healthcare
    ports:
      - "3000:3000"
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

